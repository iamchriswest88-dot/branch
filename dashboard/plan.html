<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @font-face{font-family:'NType82';src:url('uploads/NType82-Headline.otf') format('opentype');font-weight:400 700;font-display:swap;}
    @font-face{font-family:'Space Grotesk';src:url('uploads/SpaceGrotesk-Regular.otf') format('opentype');font-weight:400 700;font-display:swap;}
    @font-face{font-family:'Lettera Mono';src:url('uploads/LetteraMonoLL-Regular.otf') format('opentype');font-display:swap;}
    body{margin:0;}
  </style>
</helmet>
<div style="width:1440px;min-height:940px;box-sizing:border-box;display:flex;gap:14px;padding:14px;background:radial-gradient(#171717 1px,transparent 1.5px) 0 0/16px 16px,#0A0A0A;font-family:'Space Grotesk',sans-serif;color:#EDEDED;">

  <!-- ============ SIDEBAR ============ -->
  <aside style="width:212px;flex:0 0 auto;background:#0D0D0D;border:1px solid #1F1F1F;border-radius:16px;display:flex;flex-direction:column;padding:20px 0;">
    <div style="padding:0 20px 20px;display:flex;align-items:center;gap:11px;">
      <div style="width:34px;height:34px;border-radius:9px;border:1.5px solid #9B5CF0;display:flex;align-items:center;justify-content:center;"><div style="display:grid;grid-template-columns:repeat(3,3px);gap:2px;"><div style="width:3px;height:3px;border-radius:50%;background:#9B5CF0;"></div><div style="width:3px;height:3px;border-radius:50%;background:#3a2a55;"></div><div style="width:3px;height:3px;border-radius:50%;background:#9B5CF0;"></div><div style="width:3px;height:3px;border-radius:50%;background:#3a2a55;"></div><div style="width:3px;height:3px;border-radius:50%;background:#9B5CF0;"></div><div style="width:3px;height:3px;border-radius:50%;background:#3a2a55;"></div><div style="width:3px;height:3px;border-radius:50%;background:#9B5CF0;"></div><div style="width:3px;height:3px;border-radius:50%;background:#3a2a55;"></div><div style="width:3px;height:3px;border-radius:50%;background:#9B5CF0;"></div></div></div>
      <div style="font-family:'NType82',sans-serif;font-size:20px;letter-spacing:0px;color:#EDEDED;">Branch</div>
    </div>
    <nav style="padding:0 12px;display:flex;flex-direction:column;gap:2px;">
      <div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#8A8A8A;cursor:pointer;" data-action="nav-dashboard"><span style="width:5px;height:5px;border-radius:1px;background:#3a3a3a;"></span><span style="font-size:13.5px;">Dashboard</span></div>
      <div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#8A8A8A;cursor:pointer;" data-action="nav-gym"><span style="width:5px;height:5px;border-radius:1px;background:#3a3a3a;"></span><span style="font-size:13.5px;">Gym</span></div>
      <div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#8A8A8A;cursor:pointer;" data-action="nav-flow"><span style="width:5px;height:5px;border-radius:1px;background:#3a3a3a;"></span><span style="font-size:13.5px;">Flow</span></div>
      <div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;background:#17121F;border-left:2px solid #9B5CF0;color:#C7A8FF;cursor:pointer;" data-action="nav-plan"><span style="width:5px;height:5px;border-radius:1px;background:#9B5CF0;"></span><span style="font-size:13.5px;font-weight:500;">Plan</span></div>
      <div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#8A8A8A;cursor:pointer;" data-action="nav-library"><span style="width:5px;height:5px;border-radius:1px;background:#3a3a3a;"></span><span style="font-size:13.5px;">Library</span></div>
      <div style="height:1px;background:#1b1b1b;margin:7px 10px;"></div>
      <div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#8A8A8A;"><span style="width:5px;height:5px;border-radius:1px;background:#3a3a3a;"></span><span style="font-size:13.5px;">Glyph Interface</span></div>
    </nav>
    <div style="flex:1;"></div>
    <div style="padding:0 12px;margin-bottom:10px;"><div style="display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#8A8A8A;"><span style="width:5px;height:5px;border-radius:1px;background:#3a3a3a;"></span><span style="font-size:13.5px;">Settings</span></div></div>
    <div style="padding:0 14px;">
      <div style="display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;background:#141414;border:1px solid #1f1f1f;">
        <div style="width:30px;height:30px;border-radius:50%;background:#9B5CF0;display:flex;align-items:center;justify-content:center;font-family:'Lettera Mono',monospace;font-size:11px;color:#0A0A0A;font-weight:700;">CW</div>
        <div style="flex:1;min-width:0;"><div style="font-size:12.5px;color:#EDEDED;font-weight:500;">Chris West</div><div style="font-family:'Lettera Mono',monospace;font-size:10px;color:#5A5A5A;">Phone (3)</div></div>
      </div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:14px;">

    <!-- topbar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 4px 0;">
      <div>
        <div style="font-family:'NType82',sans-serif;font-size:28px;letter-spacing:-0.5px;color:#EDEDED;line-height:1;">Plan</div>
        <div style="font-family:'Lettera Mono',monospace;font-size:11px;letter-spacing:2px;color:#8A8A8A;margin-top:7px;">SCHEDULE WORKOUTS</div>
      </div>
    </div>

    <!-- weekly calendar -->
    <div style="background:#0D0D0D;border:1px solid #262626;border-radius:16px;overflow:hidden;flex:1;display:flex;flex-direction:column;padding:18px 22px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <div style="font-family:'Lettera Mono',monospace;font-size:11px;letter-spacing:2px;color:#8A8A8A;display:flex;align-items:center;gap:12px;">
           <span style="cursor:pointer;padding:4px 8px;border:1px solid #262626;border-radius:6px;transition:0.2s;user-select:none;" onmouseover="this.style.background='#1A1A1A'" onmouseout="this.style.background='transparent'" data-action="prev-week">&larr;</span>
           <span style="width:110px;text-align:center;">{{ weekLabel }}</span>
           <span style="cursor:pointer;padding:4px 8px;border:1px solid #262626;border-radius:6px;transition:0.2s;user-select:none;" onmouseover="this.style.background='#1A1A1A'" onmouseout="this.style.background='transparent'" data-action="next-week">&rarr;</span>
        </div>
        <div style="font-family:'Lettera Mono',monospace;font-size:11px;letter-spacing:2px;color:#EDEDED;">{{ dateRangeText }}</div>
      </div>
      
      <div style="display:flex;flex-direction:column;gap:12px;flex:1;overflow-y:auto;padding-right:8px;">
        <sc-for list="{{ weekDays }}" as="d" hint-placeholder-count="7">
          <div style="display:flex;align-items:center;justify-content:space-between;border:1px solid #262626;border-radius:12px;padding:14px 20px;background:{{ d.isRest ? 'transparent' : 'linear-gradient(90deg, rgba(30,30,30,0.4), transparent)' }};">
            
            <div style="display:flex;flex-direction:column;">
              <div style="font-family:'Lettera Mono',monospace;font-size:12px;letter-spacing:1px;color:{{ d.isRest ? '#5A5A5A' : '#EDEDED' }};margin-bottom:4px;">{{ d.dayLabel }}</div>
              <div style="font-family:'NType82',sans-serif;font-size:20px;color:{{ d.isRest ? '#3A3A3A' : '#EDEDED' }};">
                <sc-if value="{{ d.hasGym && d.hasFlow }}">Gym & Flow</sc-if>
                <sc-if value="{{ d.hasGym && !d.hasFlow }}">Gym Workout</sc-if>
                <sc-if value="{{ !d.hasGym && d.hasFlow }}">Flow Session</sc-if>
                <sc-if value="{{ !d.hasGym && !d.hasFlow }}">Rest</sc-if>
              </div>
            </div>

            <div style="display:flex;align-items:center;gap:8px;">
              <!-- Gym Button -->
              <div data-action="set-plan" data-date="{{ d.dateKey }}" data-type="gym" style="cursor:pointer;padding:8px 16px;border-radius:20px;font-family:'Lettera Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;border:1px solid {{ d.hasGym ? '#9B5CF0' : '#262626' }};background:{{ d.hasGym ? 'rgba(155,92,240,0.1)' : 'transparent' }};color:{{ d.hasGym ? '#C7A8FF' : '#8A8A8A' }};transition:all 0.2s;">GYM</div>
              
              <!-- Flow Button -->
              <div data-action="set-plan" data-date="{{ d.dateKey }}" data-type="flow" style="cursor:pointer;padding:8px 16px;border-radius:20px;font-family:'Lettera Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;border:1px solid {{ d.hasFlow ? '#4FC4F0' : '#262626' }};background:{{ d.hasFlow ? 'rgba(79,196,240,0.1)' : 'transparent' }};color:{{ d.hasFlow ? '#A8EEFF' : '#8A8A8A' }};transition:all 0.2s;">FLOW</div>
              
              <!-- Rest Button -->
              <div data-action="set-plan" data-date="{{ d.dateKey }}" data-type="rest" style="cursor:pointer;padding:8px 16px;border-radius:20px;font-family:'Lettera Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;border:1px solid {{ d.isRest ? '#EDEDED' : '#262626' }};background:{{ d.isRest ? 'rgba(255,255,255,0.05)' : 'transparent' }};color:{{ d.isRest ? '#EDEDED' : '#8A8A8A' }};transition:all 0.2s;">REST</div>
            </div>

          </div>
        </sc-for>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:960}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.state = { workouts: [], weekDays: [], dateRangeText: '', weekLabel: 'THIS WEEK' };
    this.weekOffset = 0;
    window.planComponent = this;
  }
  
  componentDidMount() {
    if (window.fetchPlanData) window.fetchPlanData(0);
  }

  renderVals() {
    const workouts = this.state.workouts ? this.state.workouts.map(w => ({
      name: w.name,
      category: w.category ? w.category.toUpperCase() : 'UNKNOWN',
      stepCount: w.steps ? w.steps.length : 0
    })) : [];
    return { 
      workouts, 
      weekDays: this.state.weekDays || [],
      dateRangeText: this.state.dateRangeText || '',
      weekLabel: this.state.weekLabel || 'THIS WEEK'
    };
  }
}
</script>
</body>
</html>
